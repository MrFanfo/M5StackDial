[platformio]
default_envs = m5dial_usb

[env]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200

lib_deps =
  m5stack/M5Unified@0.1.14
  m5stack/M5Dial@1.0.2
  knolleary/PubSubClient@2.8
  bblanchon/ArduinoJson

[env:m5dial_usb]
upload_port = /dev/ttyACM0   ; change if your serial port is different

[env:m5dial_ota]
upload_protocol = espota
upload_port = ${sysenv.M5DIAL_OTA_HOST}  ; e.g. 192.168.1.37 or M5Dial.local
upload_flags =
  --auth=${sysenv.M5DIAL_OTA_AUTH}
